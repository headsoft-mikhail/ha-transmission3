add_torrent:
  fields:
    entry_id:
      required: true
      selector:
        config_entry:
          integration: transmission3
    torrent:
      required: true
      example: "http://releases.ubuntu.com/19.04/ubuntu-19.04-desktop-amd64.iso.torrent"
      selector:
        text:
    download_path:
      required: false
      example: "/path/to/download/directory"
      selector:
        text:
    labels:
      required: false
      example: "Notify,Remove"
      selector:
        text:

get_torrents:
  fields:
    entry_id:
      required: true
      selector:
        config_entry:
          integration: transmission3

    torrent_filter:
      required: true
      default: "all"
      example: "all"
      selector:
        select:
          options:
            - value: "all"
              label: "All"
            - value: "active"
              label: "Active"
            - value: "started"
              label: "Started"
            - value: "paused"
              label: "Paused"
            - value: "completed"
              label: "Completed"

remove_torrent:
  fields:
    entry_id:
      required: true
      selector:
        config_entry:
          integration: transmission3
    id:
      required: true
      example: "123"
      selector:
        text:
    delete_data:
      required: true
      default: false
      selector:
        boolean:

start_torrent:
  fields:
    entry_id:
      required: true
      selector:
        config_entry:
          integration: transmission3
    id:
      required: true
      example: "123"
      selector:
        text:

stop_torrent:
  fields:
    entry_id:
      required: true
      selector:
        config_entry:
          integration: transmission3
    id:
      required: true
      example: "123"
      selector:
        text: